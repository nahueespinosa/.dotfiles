# Ansible variables for dotfiles provisioning

# Capture the real user who invoked sudo
real_user: "{{ ansible_user_id if ansible_user_id != 'root' else ansible_env.SUDO_USER | default(ansible_user_id) }}"
real_user_home: "{{ ansible_env.HOME if ansible_user_id != 'root' else '/home/' + real_user }}"

# Common APT packages to install
apt_packages:
  - apt-transport-https
  - build-essential
  - ca-certificates
  - curl
  - cmake
  - git
  - gnupg
  - gnome-keyring
  - htop
  - lsb-release
  - mesa-utils
  - ncdu
  - npm
  - python3
  - python3-dev
  - python3-venv
  - software-properties-common
  - tmux
  - vim
  - vim-gtk3
  - wget

# Configuration symlinks: source (relative to repo root) -> destination
dotfile_links:
  - src: "git/gitconfig"
    dest: "{{ real_user_home }}/.gitconfig"
  - src: "vim/vimrc"
    dest: "{{ real_user_home }}/.vimrc"
  - src: "tmux/tmux.conf"
    dest: "{{ real_user_home }}/.tmux.conf"
  - src: "vscode/settings.json"
    dest: "{{ real_user_home }}/.config/Code/User/settings.json"

# External tool versions and URLs
node_version: "stable"

# UV installation settings
uv_install_dir: "/usr/local/bin"
uv_managed_tools:
  - prek
